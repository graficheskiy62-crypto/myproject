<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Камень, ножницы, бумага - Игра с ИИ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 30px;
            align-items: center;
            margin-bottom: 30px;
        }

        .player-section, .computer-section {
            text-align: center;
        }

        .gesture-display {
            font-size: 5em;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .gesture-display.winner {
            animation: celebrate 0.6s ease-in-out;
            background: #d4edda;
            box-shadow: 0 0 30px rgba(40, 167, 69, 0.5);
        }

        .gesture-display.loser {
            background: #f8d7da;
        }

        .label {
            font-size: 1.3em;
            font-weight: 600;
            color: #495057;
        }

        .vs {
            font-size: 2.5em;
            font-weight: bold;
            color: #6c757d;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            background: #e9ecef;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .score-item {
            text-align: center;
        }

        .score-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #2c3e50;
        }

        .score-label {
            font-size: 1em;
            color: #6c757d;
            margin-top: 5px;
        }

        .camera-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: #000;
        }

        /* Стили для видео с камеры */
        #webcam-container {
            width: 100%;
            height: 480px;
            position: relative;
            background: #000;
        }

        #webcam-container canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Индикатор записи камеры */
        .camera-indicator {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(220, 38, 38, 0.9);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .camera-indicator.active {
            opacity: 1;
            animation: pulse-record 1.5s ease-in-out infinite;
        }

        .record-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            display: inline-block;
        }

        @keyframes pulse-record {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Рамка для распознавания жестов */
        .gesture-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 3px dashed rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        .gesture-frame.active {
            display: block;
            animation: frame-pulse 2s ease-in-out infinite;
        }

        @keyframes frame-pulse {
            0%, 100% { 
                border-color: rgba(255, 255, 255, 0.6);
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
            }
            50% { 
                border-color: rgba(255, 255, 255, 0.9);
                box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
            }
        }

        /* Индикатор распознавания */
        .recognition-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(40, 167, 69, 0.9);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            z-index: 10;
            display: none;
        }

        .recognition-badge.active {
            display: block;
            animation: badge-pulse 0.5s ease-in-out;
        }

        @keyframes badge-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .prediction-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .prediction-info h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #dee2e6;
        }

        .prediction-item:last-child {
            border-bottom: none;
        }

        .status {
            text-align: center;
            font-size: 1.2em;
            font-weight: 600;
            color: #495057;
            margin-bottom: 20px;
            min-height: 30px;
        }

        .status.waiting {
            color: #ffc107;
        }

        .status.ready {
            color: #28a745;
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        button:hover {
            background: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,123,255,0.3);
        }

        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }

        .result-message {
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            min-height: 40px;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
        }

        .result-message.win {
            color: #28a745;
            background: #d4edda;
            animation: pulse 0.5s ease-in-out;
        }

        .result-message.lose {
            color: #dc3545;
            background: #f8d7da;
        }

        .result-message.draw {
            color: #ffc107;
            background: #fff3cd;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .timer {
            text-align: center;
            font-size: 1.1em;
            color: #6c757d;
            margin-top: 10px;
            font-weight: 600;
        }

        .timer.urgent {
            color: #dc3545;
            animation: urgent-pulse 1s ease-in-out infinite;
        }

        @keyframes urgent-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Подсказка для игрока */
        .camera-hint {
            text-align: center;
            color: #6c757d;
            font-size: 0.95em;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,123,255,0.05);
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .vs {
                order: 2;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .gesture-display {
                font-size: 4em;
                min-height: 120px;
            }
            
            #webcam-container {
                height: 360px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Камень, ножницы, бумага</h1>
        
        <div class="status waiting" id="status">Загрузка модели...</div>
        
        <div class="camera-container">
            <div class="camera-indicator" id="cameraIndicator">
                <span class="record-dot"></span>
                <span>LIVE</span>
            </div>
            <div class="recognition-badge" id="recognitionBadge">📸 Распознавание...</div>
            <div class="gesture-frame" id="gestureFrame"></div>
            <div id="webcam-container"></div>
        </div>
        
        <div class="camera-hint">
            💡 Покажите жест в центре камеры: ✊ Камень, ✌️ Ножницы, ✋ Бумага
        </div>
        
        <div class="timer" id="timer">Следующий раунд через: 3 сек</div>
        
        <div class="controls">
            <button id="startBtn" onclick="startGame()" disabled>Начать игру</button>
            <button id="resetBtn" onclick="resetGame()">Сбросить счёт</button>
        </div>
        
        <div class="result-message" id="resultMessage"></div>
        
        <div class="game-area">
            <div class="player-section">
                <div class="gesture-display" id="playerGesture">❓</div>
                <div class="label">Вы</div>
            </div>
            
            <div class="vs">VS</div>
            
            <div class="computer-section">
                <div class="gesture-display" id="computerGesture">❓</div>
                <div class="label">Компьютер</div>
            </div>
        </div>
        
        <div class="score-board">
            <div class="score-item">
                <div class="score-value" id="playerScore">0</div>
                <div class="score-label">Победы</div>
            </div>
            <div class="score-item">
                <div class="score-value" id="drawScore">0</div>
                <div class="score-label">Ничьи</div>
            </div>
            <div class="score-item">
                <div class="score-value" id="computerScore">0</div>
                <div class="score-label">Поражения</div>
            </div>
        </div>
        
        <div class="prediction-info">
            <h3>📊 Распознавание жестов:</h3>
            <div id="predictions"></div>
        </div>
    </div>

    <!-- Библиотеки Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script>
        // URL модели Teachable Machine
        const URL = "https://teachablemachine.withgoogle.com/models/vkcld2gvJj/";
        
        // Глобальные переменные
        let model, webcam, maxPredictions;
        let gameActive = false;
        let countdownInterval;
        let predictionInterval;
        let animationFrameId;
        
        // Счёт игры
        let scores = {
            player: 0,
            computer: 0,
            draw: 0
        };
        
        // Соответствие жестов и символов
        const gestureSymbols = {
            "Камень": "✊",
            "Ножницы": "✌️",
            "Бумага": "✋",
            "Пусто": "❓"
        };
        
        // Загрузка модели Teachable Machine
        async function loadModel() {
            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";
                
                // Загружаем модель и метаданные
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                
                // Инициализируем веб-камеру с настройками для live video
                const flip = true; // Зеркальное отображение для удобства
                webcam = new tmImage.Webcam(640, 480, flip);
                await webcam.setup();
                await webcam.play();
                
                // Добавляем видео в контейнер
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                // Активируем индикатор камеры
                document.getElementById("cameraIndicator").classList.add("active");
                
                // Запускаем непрерывное обновление видео
                startVideoStream();
                
                // Обновляем статус
                updateStatus("Модель загружена! Нажмите 'Начать игру'", "ready");
                document.getElementById("startBtn").disabled = false;
                
                // Инициализируем отображение предсказаний
                initPredictionsDisplay();
                
            } catch (error) {
                console.error("Ошибка загрузки модели:", error);
                updateStatus("Ошибка загрузки модели. Проверьте подключение к интернету.", "waiting");
            }
        }
        
        // Непрерывная потоковая передача видео
        function startVideoStream() {
            function render() {
                if (webcam && webcam.canvas) {
                    // Обновляем кадр с камеры
                    webcam.update();
                }
                // Продолжаем цикл анимации
                animationFrameId = requestAnimationFrame(render);
            }
            render();
        }
        
        // Инициализация отображения предсказаний
        function initPredictionsDisplay() {
            const predictionsDiv = document.getElementById("predictions");
            predictionsDiv.innerHTML = "";
            
            for (let i = 0; i < maxPredictions; i++) {
                const item = document.createElement("div");
                item.className = "prediction-item";
                item.innerHTML = `
                    <span class="class-name">${model.getClassLabels()[i]}</span>
                    <span class="probability" id="prob-${i}">0%</span>
                `;
                predictionsDiv.appendChild(item);
            }
        }
        
        // Начало игры
        function startGame() {
            if (gameActive) return;
            
            gameActive = true;
            document.getElementById("startBtn").disabled = true;
            document.getElementById("gestureFrame").classList.add("active");
            updateStatus("Игра началась! Показывайте жесты в камеру", "ready");
            
            // Запускаем цикл игры
            startGameLoop();
        }
        
        // Игровой цикл
        function startGameLoop() {
            let countdown = 3;
            updateTimer(countdown);
            
            // Обратный отсчёт
            countdownInterval = setInterval(() => {
                countdown--;
                updateTimer(countdown);
                
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    playRound();
                    
                    // Если игра активна, начинаем новый цикл через 2 секунды
                    if (gameActive) {
                        setTimeout(() => {
                            if (gameActive) {
                                startGameLoop();
                            }
                        }, 2000);
                    }
                }
            }, 1000);
        }
        
        // Обновление таймера
        function updateTimer(seconds) {
            const timerElement = document.getElementById("timer");
            timerElement.textContent = `Следующий раунд через: ${seconds} сек`;
            
            if (seconds <= 1) {
                timerElement.classList.add("urgent");
            } else {
                timerElement.classList.remove("urgent");
            }
        }
        
        // Проигрывание раунда
        async function playRound() {
            updateStatus("📸 Распознаю жест...", "ready");
            
            // Показываем индикатор распознавания
            const badge = document.getElementById("recognitionBadge");
            badge.classList.add("active");
            
            try {
                // Обновляем кадр с камеры (последний кадр из потока)
                webcam.update();
                
                // Получаем предсказание
                const predictions = await model.predict(webcam.canvas);
                
                // Находим жест с наибольшей вероятностью
                let playerGesture = "Пусто";
                let maxProbability = 0;
                
                predictions.forEach(prediction => {
                    // Обновляем отображение вероятностей
                    const classIndex = model.getClassLabels().indexOf(prediction.className);
                    const probabilityPercent = Math.round(prediction.probability * 100);
                    document.getElementById(`prob-${classIndex}`).textContent = 
                        `${probabilityPercent}%`;
                    
                    if (prediction.probability > maxProbability) {
                        maxProbability = prediction.probability;
                        playerGesture = prediction.className;
                    }
                });
                
                // Если жест не распознан (низкая вероятность), используем "Пусто"
                if (maxProbability < 0.7) {
                    playerGesture = "Пусто";
                }
                
                // Компьютер выбирает случайно
                const computerChoices = ["Камень", "Ножницы", "Бумага"];
                const computerGesture = computerChoices[Math.floor(Math.random() * 3)];
                
                // Отображаем жесты
                displayGestures(playerGesture, computerGesture);
                
                // Определяем результат
                const result = determineWinner(playerGesture, computerGesture);
                displayResult(result);
                
                // Обновляем счёт
                updateScores(result);
                
                // Скрываем индикатор распознавания через 1 секунду
                setTimeout(() => {
                    badge.classList.remove("active");
                }, 1000);
                
            } catch (error) {
                console.error("Ошибка распознавания:", error);
                updateStatus("Ошибка распознавания. Попробуйте снова.", "waiting");
                badge.classList.remove("active");
            }
        }
        
        // Отображение жестов
        function displayGestures(player, computer) {
            const playerElement = document.getElementById("playerGesture");
            const computerElement = document.getElementById("computerGesture");
            
            playerElement.textContent = gestureSymbols[player] || "❓";
            computerElement.textContent = gestureSymbols[computer] || "❓";
            
            // Убираем предыдущие классы
            playerElement.classList.remove("winner", "loser");
            computerElement.classList.remove("winner", "loser");
        }
        
        // Определение победителя
        function determineWinner(player, computer) {
            if (player === "Пусто") {
                return "no-gesture";
            }
            
            if (player === computer) {
                return "draw";
            }
            
            // Правила победы
            const winningMoves = {
                "Камень": "Ножницы",
                "Ножницы": "Бумага",
                "Бумага": "Камень"
            };
            
            if (winningMoves[player] === computer) {
                return "win";
            } else {
                return "lose";
            }
        }
        
        // Отображение результата
        function displayResult(result) {
            const messageElement = document.getElementById("resultMessage");
            const playerElement = document.getElementById("playerGesture");
            const computerElement = document.getElementById("computerGesture");
            
            messageElement.className = "result-message";
            
            switch(result) {
                case "win":
                    messageElement.textContent = "🎉 Вы победили!";
                    messageElement.classList.add("win");
                    playerElement.classList.add("winner");
                    computerElement.classList.add("loser");
                    break;
                case "lose":
                    messageElement.textContent = "😔 Компьютер победил";
                    messageElement.classList.add("lose");
                    playerElement.classList.add("loser");
                    computerElement.classList.add("winner");
                    break;
                case "draw":
                    messageElement.textContent = "🤝 Ничья!";
                    messageElement.classList.add("draw");
                    break;
                case "no-gesture":
                    messageElement.textContent = "⚠️ Жест не распознан. Покажите четче!";
                    messageElement.classList.add("draw");
                    break;
            }
        }
        
        // Обновление счёта
        function updateScores(result) {
            switch(result) {
                case "win":
                    scores.player++;
                    break;
                case "lose":
                    scores.computer++;
                    break;
                case "draw":
                    scores.draw++;
                    break;
            }
            
            // Обновляем отображение
            document.getElementById("playerScore").textContent = scores.player;
            document.getElementById("computerScore").textContent = scores.computer;
            document.getElementById("drawScore").textContent = scores.draw;
        }
        
        // Сброс игры
        function resetGame() {
            gameActive = false;
            clearInterval(countdownInterval);
            
            scores = { player: 0, computer: 0, draw: 0 };
            
            document.getElementById("playerScore").textContent = "0";
            document.getElementById("computerScore").textContent = "0";
            document.getElementById("drawScore").textContent = "0";
            
            document.getElementById("playerGesture").textContent = "❓";
            document.getElementById("computerGesture").textContent = "❓";
            document.getElementById("playerGesture").classList.remove("winner", "loser");
            document.getElementById("computerGesture").classList.remove("winner", "loser");
            
            document.getElementById("resultMessage").textContent = "";
            document.getElementById("resultMessage").className = "result-message";
            
            document.getElementById("timer").textContent = "Следующий раунд через: 3 сек";
            document.getElementById("timer").classList.remove("urgent");
            
            document.getElementById("gestureFrame").classList.remove("active");
            document.getElementById("recognitionBadge").classList.remove("active");
            
            updateStatus("Нажмите 'Начать игру'", "waiting");
            document.getElementById("startBtn").disabled = false;
        }
        
        // Обновление статуса
        function updateStatus(message, type) {
            const statusElement = document.getElementById("status");
            statusElement.textContent = message;
            statusElement.className = `status ${type}`;
        }
        
        // Остановка видео потока при закрытии страницы
        window.addEventListener("beforeunload", () => {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            if (webcam) {
                webcam.stop();
            }
        });
        
        // Запуск при загрузке страницы
        window.addEventListener("load", loadModel);
    </script>
</body>
</html>
